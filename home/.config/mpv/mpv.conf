# Video
vo=gpu
gpu-context=wayland
hwdec=vaapi
hwdec-codecs=all
interpolation=no
scale=bilinear
cscale=bilinear
dscale=mitchell
deband=no
video-sync=display-resample

# Audio
volume-max=150

# Subtitles
slang=en,eng
alang=en,eng
sub-auto=fuzzy

# OSD/UI 
osc=yes
osd-level=1

# Screenshots #
screenshot-format=png
screenshot-directory=~/Pictures/Mpv

# yt-dlp
script-opts=ytdl_hook-ytdl_path=yt-dlp
ytdl-format=bestvideo[height<=1080][fps<=60]+bestaudio/best[height<=1080]
ytdl-raw-options=no-playlist=,retries=10,fragment-retries=10,concurrent-fragments=4

# Profiles
[normal]
cache=yes
cache-secs=10
demuxer-readahead-secs=15
demuxer-max-bytes=96MiB
save-position-on-quit=no
[film]
cache=yes
cache-secs=30
demuxer-readahead-secs=30
demuxer-max-bytes=192MiB
save-position-on-quit=yes
[sports]
cache=no
demuxer-readahead-secs=1
demuxer-max-bytes=4MiB
save-position-on-quit=no
video-sync=audio

